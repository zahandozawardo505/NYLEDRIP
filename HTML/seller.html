<nav class="navbar">

    <div class="navbar-brand"><a class="logo" href="../index.html">NILE<span class="drip">DRIP</span></a></div>

    <div class="navbar-actions">
      <a href="wishlist.html" class="cart-icon-btn wishlist-icon-btn" aria-label="Wishlist"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg><span id="wishlistNavBadge" class="cart-nav-badge" style="display:none">0</span></a>

      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    </div>
  </div>
</nav>

<section class="shop-section">
  <div class="container">
    <div id="sellerBox" class="dashboard-card" style="margin-bottom:20px;"></div>
    <section id="sellerReelsSection" class="seller-reels-section" style="display:none;">
      <div class="seller-reels-head">
        <h2>Shop The Reels</h2>
        <p>Scroll social videos and jump directly to featured products.</p>
      </div>
      <div id="sellerReelsFeed" class="reels-feed"></div>
      <p id="emptySellerReels" class="reels-empty" style="display:none;">No reels available yet.</p>
    </section>
    <h2 style="margin-bottom:16px;">Seller Products</h2>
    <div class="products-grid" id="sellerProducts"></div>
    <p id="emptySellerProducts" style="display:none;">This seller has no products yet.</p>
  </div>
</section>

<div id="reelFullscreenModal" class="reel-fullscreen-modal" style="display:none;" aria-hidden="true">
  <div class="reel-fullscreen-backdrop" data-close-reel-modal="1"></div>
  <div class="reel-fullscreen-dialog">
    <button class="btn btn-secondary reel-fullscreen-close" id="reelFullscreenCloseBtn" type="button">Close</button>
    <div class="reel-fullscreen-frame-wrap" id="reelFullscreenFrameWrap"></div>
  </div>
</div>

<script src="../JS/store.js"></script><script src="../JS/db.js"></script><script src="../JS/i18n.js"></script><script src="../JS/api.js"></script><script src="../JS/utils.js"></script><script src="../JS/theme.js"></script><script src="../JS/main.js"></script>
<script src="../JS/seller-page.js"></script>
