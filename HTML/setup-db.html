<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NileDrip | One-Click Setup</title>
    <link rel="stylesheet" href="../CSS/style-base.css">
    <style>
        .setup-container { max-width: 600px; margin: 100px auto; text-align: center; padding: 40px; background: var(--bg-secondary); border-radius: 20px; border: 1px solid var(--border-color); }
        .status-box { margin-top: 20px; padding: 20px; text-align: left; background: #000; color: #0f0; font-family: monospace; font-size: 12px; border-radius: 10px; height: 200px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="setup-container">
        <h1>🚀 NileDrip Auto-Setup</h1>
        <p>This will attempt to verify your database connection and prepare your tables.</p>
        <button id="runSetup" class="btn btn-primary btn-large" style="margin-top: 20px;">Run Auto-Setup</button>
        
        <div class="status-box" id="log">
            > Ready to initialize...
        </div>

        <div style="margin-top: 20px;">
            <a href="../index.html" class="nav-link">← Back to Site</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../JS/supabase-config.js"></script>
    <script>
        const logEl = document.getElementById('log');
        const btn = document.getElementById('runSetup');

        function log(msg, color = '#0f0') {
            const span = document.createElement('div');
            span.style.color = color;
            span.textContent = `> ${msg}`;
            logEl.appendChild(span);
            logEl.scrollTop = logEl.scrollHeight;
        }

        btn.addEventListener('click', async () => {
            btn.disabled = true;
            btn.textContent = 'Setting up...';
            
            log("Checking connection...");
            if (!supabaseClient) {
                log("ERROR: Supabase Client not found. Check your keys in JS/supabase-config.js", "red");
                btn.disabled = false;
                return;
            }

            log("Testing connection to 'products' table...");
            const { data, error } = await supabaseClient.from('products').select('*').limit(1);

            if (error && error.code === '42P01') {
                log("TABLES MISSING: I cannot create tables via JavaScript (Supabase Security).", "orange");
                log("PLEASE DO THIS ONE THING:", "yellow");
                log("1. Go to Supabase SQL Editor");
                log("2. Paste the SQL I gave you in the chat.");
                log("3. Hit RUN.");
            } else if (error) {
                log(`ERROR: ${error.message}`, "red");
            } else {
                log("SUCCESS: Database is connected and tables exist!", "#0f0");
            }
            
            log("Setup check finished.");
            btn.textContent = 'Check Again';
            btn.disabled = false;
        });
    </script>
</body>
</html>
