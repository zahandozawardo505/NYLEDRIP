<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NileDrip | Profile</title>
    <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="../CSS/style-base.css">
    <link rel="stylesheet" href="../CSS/style-profile.css">
</head>
<body>
<nav class="navbar"><div class="container"><div class="navbar-brand"><a href="../index.html" class="logo">NILE<span class="drip">DRIP</span></a></div><div class="navbar-menu" id="navbarMenu"><a href="shop.html" class="nav-link">Shop</a><a href="profile.html" class="nav-link active">Profile</a></div><div class="navbar-actions"><a href="wishlist.html" class="cart-icon-btn wishlist-icon-btn" aria-label="Wishlist"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg><span id="wishlistNavBadge" class="cart-nav-badge" style="display:none">0</span></a><a href="cart.html" class="cart-icon-btn" aria-label="Cart"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg><span id="cartNavBadge" class="cart-nav-badge" style="display:none">0</span></a><button class="theme-toggle" id="themeToggle" aria-label="Toggle theme"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg></button></div></div></nav>

<main class="container profile-shell">
    <aside class="profile-card">
        <img id="avatarPreview" class="profile-avatar" alt="Avatar">
        <h1 class="profile-title" id="greetText">Hi User</h1>
        <p id="mailText" class="profile-sub"></p>
        <p id="lastLoginText" class="profile-sub"></p>
        <label for="avatarInput" class="profile-sub">Profile photo</label>
        <input id="avatarInput" type="file" accept="image/jpeg,image/png,image/webp" class="profile-input">
        <button class="btn btn-primary" id="uploadAvatarBtn">Upload Avatar</button>
        <div class="stats-grid">
            <div class="stat-card"><h4>Orders</h4><p id="ordersCount">0</p></div>
            <div class="stat-card"><h4>Wishlist</h4><p id="wishlistCount">0</p></div>
            <div class="stat-card"><h4>Cart</h4><p id="cartCount">0</p></div>
        </div>
        <div class="profile-actions">
            <button class="btn btn-secondary" id="syncStateBtn">Sync Cart/Wishlist</button>
            <button class="btn btn-secondary" id="logoutAllBtn">Logout All Devices</button>
            <button class="btn btn-danger" id="logoutBtn">Logout</button>
        </div>
    </aside>

    <section class="profile-list">
        <div class="profile-card">
            <div class="profile-section-head"><h2>Account Details</h2></div>
            <div class="profile-grid-2">
                <div><label>First Name</label><input id="firstNameInput" class="profile-input" placeholder="First name"></div>
                <div><label>Last Name</label><input id="lastNameInput" class="profile-input" placeholder="Last name"></div>
            </div>
            <div class="profile-grid-2">
                <div><label>Email</label><input id="emailInput" class="profile-input" type="email" placeholder="Email"></div>
                <div><label>Phone</label><input id="phoneInput" class="profile-input" placeholder="Phone"></div>
            </div>
            <button class="btn btn-primary" id="saveDetailsBtn">Save Details</button>
        </div>

        <div class="profile-card">
            <div class="profile-section-head"><h2>Change Password</h2></div>
            <div class="profile-grid-2">
                <div><label>Current Password</label><input id="currentPasswordInput" type="password" class="profile-input"></div>
                <div><label>New Password</label><input id="newPasswordInput" type="password" class="profile-input"></div>
            </div>
            <div><label>Confirm New Password</label><input id="confirmPasswordInput" type="password" class="profile-input"></div>
            <button class="btn btn-primary" id="changePasswordBtn">Update Password</button>
        </div>

        <div class="profile-card">
            <div class="profile-section-head"><h2>Preferences</h2></div>
            <div class="profile-grid-2">
                <div><label>Language</label><select id="prefLanguage" class="profile-select"><option value="en">English</option></select></div>
                <div></div>
            </div>
            <div class="profile-checkbox-stack">
                <div class="profile-checkbox-row">
                    <input type="checkbox" id="prefOrderUpdates">
                    <label for="prefOrderUpdates">Order updates notifications</label>
                </div>
                <div class="profile-checkbox-row">
                    <input type="checkbox" id="prefMarketingEmails">
                    <label for="prefMarketingEmails">Marketing emails</label>
                </div>
            </div>
            <div class="profile-actions"><button class="btn btn-primary" id="savePreferencesBtn">Save Preferences</button></div>
        </div>

        <div class="profile-card">
            <div class="profile-section-head"><h2>Address Book</h2></div>
            <div class="profile-grid-2">
                <div><label>Label</label><input id="addrLabel" class="profile-input" placeholder="Home"></div>
                <div><label>Full Name</label><input id="addrFullName" class="profile-input"></div>
            </div>
            <div class="profile-grid-2">
                <div><label>Phone</label><input id="addrPhone" class="profile-input"></div>
                <div><label>City</label><input id="addrCity" class="profile-input"></div>
            </div>
            <div><label>Address Line 1</label><input id="addrLine1" class="profile-input"></div>
            <div><label>Address Line 2</label><input id="addrLine2" class="profile-input"></div>
            <div class="profile-grid-2">
                <div><label>State</label><input id="addrState" class="profile-input"></div>
                <div><label>Postal Code</label><input id="addrPostalCode" class="profile-input"></div>
            </div>
            <div class="profile-grid-2">
                <div><label>Country</label><input id="addrCountry" class="profile-input" value="Egypt"></div>
                <div>
                    <div class="profile-checkbox-row">
                        <input type="checkbox" id="addrDefault">
                        <label for="addrDefault">Set as default</label>
                    </div>
                </div>
            </div>
            <button class="btn btn-primary" id="addAddressBtn">Add Address</button>
            <div id="addressesList" class="profile-list" style="margin-top:12px;"></div>
        </div>

        <div class="profile-card">
            <div class="profile-section-head"><h2>Order History</h2></div>
            <div id="ordersList" class="profile-list"></div>
        </div>

        <div class="profile-card">
            <div class="profile-section-head"><h2>Support</h2></div>
            <p class="profile-sub">Need help with returns, shipping, or account issues?</p>
            <p class="support-links">
                <a href="mailto:hello@niledrip.com">Email Support</a>
                <a href="mailto:returns@niledrip.com">Request Return</a>
                <a href="shop.html">Continue Shopping</a>
            </p>
        </div>
    </section>

</main>

<div class="rating-modal" id="profileRatingModal" aria-hidden="true">
    <div class="rating-modal-card">
        <h3>Rate delivered product</h3>
        <p class="profile-sub" id="profileRatingProductText"></p>
        <div class="star-rating-input" id="profileReviewStars" role="radiogroup" aria-label="Rating"></div>
        <textarea id="profileReviewComment" class="profile-input" placeholder="Optional comment"></textarea>
        <div class="profile-actions">
            <button class="btn btn-secondary" id="cancelProfileRatingBtn" type="button">Cancel</button>
            <button class="btn btn-primary" id="submitProfileRatingBtn" type="button">Submit Review</button>
        </div>
    </div>
</div>
<script src="../JS/store.js"></script><script src="../JS/db.js"></script><script src="../JS/i18n.js"></script><script src="../JS/api.js"></script><script src="../JS/utils.js"></script><script src="../JS/theme.js"></script><script src="../JS/main.js"></script><script src="../JS/profile.js"></script>
</body>
</html>
